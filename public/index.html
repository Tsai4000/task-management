<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Management</title>
  <style>
    :root {
      --bg:       #0f1117;
      --bg-2:     #1a1d27;
      --bg-3:     #222533;
      --border:   #2e3347;
      --text:     #e2e8f0;
      --muted:    #718096;
      --accent:   #6366f1;

      --s-pending:     #f59e0b;
      --s-in_progress: #6366f1;
      --s-done:        #10b981;
      --s-blocked:     #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 頂部 ── */
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-2);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    #total-count { font-size: 12px; color: var(--muted); }

    /* ── 版面 ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── 左欄 ── */
    .sidebar {
      width: 360px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .controls {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-2);
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
    }
    input[type="text"]:focus { outline: none; border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .filter-row { display: flex; gap: 6px; }

    select {
      flex: 1;
      padding: 6px 6px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--accent); }

    .archive-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
    }
    .archive-row input[type="checkbox"] {
      accent-color: var(--accent);
      width: 13px;
      height: 13px;
      cursor: pointer;
    }

    /* ── 列表 ── */
    #task-list { flex: 1; overflow-y: auto; }

    .task-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }
    .task-item:hover { background: var(--bg-2); }
    .task-item.active {
      background: var(--bg-3);
      border-left-color: var(--accent);
    }
    .task-item.archived-item .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .item-top {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
    }
    .task-id { font-size: 11px; color: var(--muted); font-family: monospace; }

    .badge {
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }
    .s-pending     { background: rgba(245,158,11,.15); color: var(--s-pending); }
    .s-in_progress { background: rgba(99,102,241,.15);  color: var(--s-in_progress); }
    .s-done        { background: rgba(16,185,129,.15);  color: var(--s-done); }
    .s-blocked     { background: rgba(239,68,68,.15);   color: var(--s-blocked); }
    .p-P0 { background: rgba(239,68,68,.15);   color: #ef4444; }
    .p-P1 { background: rgba(245,158,11,.15);  color: #f59e0b; }
    .p-P2 { background: rgba(107,114,128,.15); color: #9ca3af; }
    .archived-badge { background: rgba(107,114,128,.15); color: #9ca3af; }

    .task-title { font-size: 13px; line-height: 1.4; }
    .task-meta  { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .empty-msg { padding: 24px; text-align: center; font-size: 13px; color: var(--muted); }

    /* ── 分頁 ── */
    .pagination {
      padding: 9px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .page-btns { display: flex; gap: 4px; }
    .page-btn {
      padding: 4px 10px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .page-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
    .page-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── 詳情面板 ── */
    .detail { flex: 1; overflow-y: auto; padding: 24px 28px; }

    .placeholder {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
    }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .detail-id   { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .detail-title { font-size: 20px; font-weight: 600; line-height: 1.3; }

    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-3);
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn:hover { background: var(--bg-2); color: var(--text); }
    .btn-danger { color: #ef4444; border-color: rgba(239,68,68,.3); }
    .btn-danger:hover { background: rgba(239,68,68,.1); }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      padding: 16px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }
    .field span { font-size: 13px; }

    .section { margin-bottom: 18px; }
    .section-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 7px;
    }
    .section-body {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      white-space: pre-wrap;
    }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      padding: 2px 9px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
    }

    .log-entry {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      line-height: 1.5;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-date { color: var(--muted); margin-right: 8px; font-family: monospace; font-size: 11px; }
  </style>
</head>
<body>
  <header>
    <h1>Task Management</h1>
    <span id="total-count"></span>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="controls">
        <input type="text" id="search" placeholder="搜尋標題、目標、實作備註…">
        <div class="filter-row">
          <select id="filter-status">
            <option value="">所有狀態</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
            <option value="blocked">Blocked</option>
          </select>
          <select id="filter-priority">
            <option value="">所有優先級</option>
            <option value="P0">P0</option>
            <option value="P1">P1</option>
            <option value="P2">P2</option>
          </select>
          <select id="filter-assigned">
            <option value="">所有負責人</option>
            <option value="claude">Claude</option>
            <option value="copilot">Copilot</option>
            <option value="human">Human</option>
          </select>
        </div>
        <label class="archive-row">
          <input type="checkbox" id="show-archived">
          顯示已封存的 task
        </label>
      </div>
      <div id="task-list"><div class="empty-msg">載入中…</div></div>
      <div class="pagination" id="pagination" style="display:none">
        <span id="page-info"></span>
        <div class="page-btns">
          <button class="page-btn" id="prev-btn" onclick="changePage(-1)">‹ 上一頁</button>
          <button class="page-btn" id="next-btn" onclick="changePage(1)">下一頁 ›</button>
        </div>
      </div>
    </div>
    <div class="detail" id="detail">
      <div class="placeholder">← 選擇一個 task 查看詳情</div>
    </div>
  </div>

  <script>
    const PAGE_SIZE = 20;
    const state = { search: '', status: '', priority: '', assigned_to: '', show_archived: false, page: 1, total: 0, selectedId: null };
    let searchTimer = null;

    // ── 事件 ──
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { state.search = e.target.value; state.page = 1; loadTasks(); }, 300);
    });
    ['filter-status', 'filter-priority', 'filter-assigned'].forEach(id => {
      document.getElementById(id).addEventListener('change', e => {
        state[id.replace('filter-', '')] = e.target.value;
        state.page = 1;
        loadTasks();
      });
    });
    document.getElementById('show-archived').addEventListener('change', e => {
      state.show_archived = e.target.checked;
      state.page = 1;
      loadTasks();
    });

    // ── 資料 ──
    async function loadTasks() {
      const p = new URLSearchParams({ page: state.page, page_size: PAGE_SIZE });
      if (state.search)        p.set('search', state.search);
      if (state.status)        p.set('status', state.status);
      if (state.priority)      p.set('priority', state.priority);
      if (state.assigned_to)   p.set('assigned_to', state.assigned_to);
      if (state.show_archived) p.set('show_archived', 'true');

      const res  = await fetch(`/tasks?${p}`);
      const data = await res.json();
      state.total = data.total;
      document.getElementById('total-count').textContent = `共 ${data.total} 筆`;
      renderList(data.tasks);
      renderPagination(data.total);
    }

    async function loadDetail(id) {
      const res  = await fetch(`/tasks/${id}`);
      const task = await res.json();
      renderDetail(task);
    }

    // ── 渲染：列表 ──
    function renderList(tasks) {
      const el = document.getElementById('task-list');
      if (!tasks.length) { el.innerHTML = '<div class="empty-msg">沒有符合條件的 task</div>'; return; }
      el.innerHTML = tasks.map(t => `
        <div class="task-item ${t.archived ? 'archived-item' : ''} ${t.id === state.selectedId ? 'active' : ''}"
             data-id="${t.id}" onclick="selectTask('${t.id}')">
          <div class="item-top">
            <span class="task-id">${t.id}</span>
            <span class="badge s-${t.status}">${sLabel(t.status)}</span>
            <span class="badge p-${t.priority}">${t.priority}</span>
            ${t.archived ? '<span class="badge archived-badge">封存</span>' : ''}
          </div>
          <div class="task-title">${esc(t.title)}</div>
          <div class="task-meta">${t.assigned_to} · ${fmtDate(t.created_at)}</div>
        </div>
      `).join('');
    }

    // ── 渲染：分頁 ──
    function renderPagination(total) {
      const pages = Math.ceil(total / PAGE_SIZE);
      const el = document.getElementById('pagination');
      if (pages <= 1) { el.style.display = 'none'; return; }
      el.style.display = 'flex';
      document.getElementById('page-info').textContent = `第 ${state.page} / ${pages} 頁`;
      document.getElementById('prev-btn').disabled = state.page <= 1;
      document.getElementById('next-btn').disabled = state.page >= pages;
    }

    function changePage(d) { state.page += d; loadTasks(); }

    // ── 選取 task ──
    function selectTask(id) {
      state.selectedId = id;
      document.querySelectorAll('.task-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
      document.getElementById('detail').innerHTML = '<div class="empty-msg">載入中…</div>';
      loadDetail(id);
    }

    // ── 渲染：詳情 ──
    function renderDetail(t) {
      const archiveBtn = t.archived
        ? `<button class="btn" onclick="setArchived('${t.id}', false)">取消封存</button>`
        : `<button class="btn btn-danger" onclick="setArchived('${t.id}', true)">封存 Task</button>`;

      const grid = [
        ['狀態',     `<span class="badge s-${t.status}">${sLabel(t.status)}</span>`],
        ['優先級',   `<span class="badge p-${t.priority}">${t.priority}</span>`],
        ['負責人',   t.assigned_to],
        ['建立時間', fmtDate(t.created_at)],
        ['開始時間', t.started_at   ? fmtDate(t.started_at)   : '—'],
        ['完成時間', t.completed_at ? fmtDate(t.completed_at) : '—'],
        ['Branch',   t.branch      || '—'],
        ['Base',     t.base_branch || '—'],
        ['Worktree', t.worktree    || '—'],
        ['PR',       t.pr_link ? `<a href="${t.pr_link}" target="_blank" style="color:var(--accent)">${esc(t.pr_link)}</a>` : '—'],
      ].map(([l, v]) => `<div class="field"><label>${l}</label><span>${v}</span></div>`).join('');

      const textSec = (title, val) => val ? `
        <div class="section">
          <div class="section-title">${title}</div>
          <div class="section-body">${esc(val)}</div>
        </div>` : '';

      const tagSec = (title, arr) => arr?.length ? `
        <div class="section">
          <div class="section-title">${title}</div>
          <div class="tag-list">${arr.map(i => `<span class="tag">${esc(i)}</span>`).join('')}</div>
        </div>` : '';

      const logSec = t.status_log?.length ? `
        <div class="section">
          <div class="section-title">狀態記錄</div>
          <div class="section-body" style="padding:0">
            ${t.status_log.map(e => `
              <div class="log-entry">
                <span class="log-date">${fmtDate(e.date)}</span>${esc(e.message)}
              </div>`).join('')}
          </div>
        </div>` : '';

      document.getElementById('detail').innerHTML = `
        <div class="detail-header">
          <div>
            <div class="detail-id">${t.id}${t.archived ? ' · <span style="color:#9ca3af">已封存</span>' : ''}</div>
            <div class="detail-title">${esc(t.title)}</div>
          </div>
          ${archiveBtn}
        </div>
        <div class="detail-grid">${grid}</div>
        ${textSec('目標', t.objective)}
        ${textSec('子任務', t.subtasks)}
        ${textSec('實作備註', t.impl_notes)}
        ${textSec('完成備註', t.completion_notes)}
        ${tagSec('Dependencies', t.depends_on)}
        ${tagSec('Skills', t.skills)}
        ${tagSec('相關規格', t.relevant_specs)}
        ${logSec}
      `;
    }

    // ── 封存/取消封存 ──
    async function setArchived(id, val) {
      await fetch(`/tasks/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ archived: val }),
      });
      loadTasks();
      loadDetail(id);
    }

    // ── 工具函式 ──
    function sLabel(s) {
      return { pending: 'Pending', in_progress: 'In Progress', done: 'Done', blocked: 'Blocked' }[s] ?? s;
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }
    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadTasks();
  </script>
</body>
</html>
